{% extends "base.html" %}

{% block title %}Settings - Stress Level Predictor{% endblock %}

{% block content %}
    <div class="container">
        <h1 align="center">Settings</h1>
        <p align="center" class="subtitle">Manage your account preferences</p>

        {% if message %}
            <div class="alert alert-{{ message_type or 'info' }}">{{ message }}</div>
        {% endif %}

        <div class="form-section">
            <h3>Change Password</h3>
            <form method="POST" action="{{ url_for('settings') }}">
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input class="form-control" type="password" name="password" placeholder="Enter new password">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input class="form-control" type="password" name="confirm_password" placeholder="Confirm new password">
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </div>
    </div>
{% endblock %}
